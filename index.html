<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sports Scores Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial, sans-serif; margin:0; background:#0f172a; color:white; }
header { padding:15px; text-align:center; font-size:24px; font-weight:bold; background:#020617; }

.tabs { display:flex; overflow-x:auto; background:#1e293b; position:sticky; top:0; z-index:1000; }
.tab { padding:12px 18px; cursor:pointer; display:flex; align-items:center; white-space:nowrap; }
.tab img { width:20px; margin-right:6px; }
.tab.active { border-bottom:3px solid #38bdf8; background:#0f172a; }

.section-title { text-align:center; font-weight:bold; margin:10px 0; }

.content { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; padding:20px; }
@media(max-width:1024px){ .content { grid-template-columns:repeat(2,1fr); } }
@media(max-width:800px){ .content { grid-template-columns:1fr; } }

.game { background:white; color:black; padding:12px; border-radius:10px; }

.team-line { display:flex; align-items:center; gap:8px; font-weight:bold; }
.team-line img { width:26px; flex:0 0 auto; }

.spacer { height:6px; }
.divider { border-top:1px solid #ddd; margin:6px 0; }

.status { font-size:14px; color:#333; line-height:1.45; }
.status small { font-size:12px; }
.status-line {
    display:block;
    margin-top:2px;
}
.status-line:first-child {
    margin-top:0;
}

.pitchers {
    font-size:12px;
    color:#444;
    margin-top:6px;
    margin-bottom:10px;
    line-height:1.4;
}

@keyframes pulse {
    0% { transform:scale(1); }
    50% { transform:scale(1.2); }
    100% { transform:scale(1); }
}
.live-badge {
    background:red;
    color:white;
    font-size:11px;
    padding:2px 6px;
    border-radius:10px;
    margin-right:6px;
    animation:pulse 1s infinite;
}

.scoreboard { margin-top:8px; font-size:12px; overflow-x:auto; }
.scoreboard table { width:100%; border-collapse:collapse; }
.scoreboard th, .scoreboard td { padding:4px 6px; text-align:center; }
.scoreboard th { border-bottom:1px solid #ccc; }
.scoreboard td { border-bottom:1px solid #eee; }
.team-cell { text-align:left !important; font-weight:bold; white-space:nowrap; }
.total-cell { font-weight:bold; }

@keyframes numberFlash {
    0% { transform:scale(1); opacity:1; }
    35% { transform:scale(1.22); opacity:0.75; }
    100% { transform:scale(1); opacity:1; }
}
.cell-value {
    display:inline-block;
}
.number-changed {
    animation:numberFlash 0.45s ease;
}

/* MLB count dots */
.count-wrap {
    display:inline-flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
}
.count-label {
    display:inline-flex;
    align-items:center;
    gap:4px;
}
.count-group {
    display:inline-flex;
    align-items:center;
    gap:3px;
    min-width:18px;
}
.dot {
    width:8px;
    height:8px;
    border-radius:50%;
    display:inline-block;
    border:1px solid rgba(0,0,0,0.18);
}
.dot.ball { background:#facc15; }
.dot.strike { background:#111827; }
.dot.out { background:#dc2626; }
.count-empty {
    display:inline-block;
    width:8px;
    height:8px;
    border-radius:50%;
    background:#e5e7eb;
    border:1px solid rgba(0,0,0,0.08);
}

/* Base runner diamond */
.basepath-wrap {
    display:inline-flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
}
.baseball-diamond {
    position: relative;
    width: 28px;
    height: 24px;
    margin: 2px 4px 2px 2px;
}
.base {
    position: absolute;
    width: 9px;
    height: 9px;
    background: #e5e7eb;
    border: 1px solid rgba(0,0,0,0.12);
    box-sizing: border-box;
    border-radius: 1px;
    transform: rotate(45deg);
}
.base.on {
    background: #22c55e;
    box-shadow: 0 0 6px rgba(34,197,94,0.45);
}
.base.second { top: 0; left: 50%; transform: translateX(-50%) rotate(45deg); }
.base.third  { bottom: 0; left: 2px; }
.base.first  { bottom: 0; right: 2px; }
</style>
</head>

<body>

<header>Sports Scores Dashboard</header>
<div class="tabs" id="tabs"></div>
<div id="content-container"></div>

<script>
const leagues = {
    NHL: "hockey/nhl",
    MLB: "baseball/mlb",
    NFL: "football/nfl",
    NBA: "basketball/nba",
    WNBA: "basketball/wnba",
    NCAAMB: "basketball/mens-college-basketball"
};

const leagueLogos = {
    NHL: "images/nhl.svg",
    MLB: "images/mlb.svg",
    NFL: "images/nfl.svg",
    NBA: "images/nba.svg",
    WNBA: "images/wnba.svg",
    NCAAMB: "images/ncaamb.svg"
};

let currentLeague = "NHL";
const tabsDiv = document.getElementById("tabs");
const containerDiv = document.getElementById("content-container");
let gameStateMap = {};
let refreshInFlight = false;

Object.keys(leagues).forEach(l => {
    const tab = document.createElement("div");
    tab.className = "tab" + (l === currentLeague ? " active" : "");
    tab.innerHTML = `<img src="${leagueLogos[l]}" alt="${l} logo">${l}`;
    tab.onclick = () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        currentLeague = l;
        loadGames();
    };
    tabsDiv.appendChild(tab);
});

function getSortedTeams(home, away){
    if(home.score == null || away.score == null) return [away, home];
    return Number(home.score) >= Number(away.score) ? [home, away] : [away, home];
}

function formatPitcher(p){
    if(!p) return "TBD";

    const name = p.athlete?.displayName || "TBD";
    const handRaw = p.athlete?.hand?.type;
    const hand = handRaw === "L" ? "LHP" : handRaw === "R" ? "RHP" : "";

    const era = p.statistics?.find(s => s.name === "era")?.displayValue
             || p.statistics?.[0]?.displayValue
             || "--";

    const record = p.records?.[0]?.summary || "";

    const details = [];
    if(hand) details.push(hand);
    if(record) details.push(record);
    details.push(`${era} ERA`);

    return `${name} (${details.join(", ")})`;
}

function getSituation(event){
    const comp = event.competitions?.[0] || {};
    return event.situation || comp.situation || {};
}

function buildDots(count, type, maxCount){
    let html = '<span class="count-group">';
    for(let i = 0; i < maxCount; i++){
        if(i < count){
            html += `<span class="dot ${type}"></span>`;
        } else {
            html += `<span class="count-empty"></span>`;
        }
    }
    html += '</span>';
    return html;
}

function getBaseOccupancy(situation){
    const athletes = situation?.onFirst || situation?.onSecond || situation?.onThird
        ? null
        : (situation?.runners || situation?.baseRunners || situation?.athletes || []);

    const first = !!(
        situation?.onFirst ||
        situation?.first ||
        athletes?.some?.(r => r?.base === 1 || r?.currentBase === 1 || r?.baseNumber === 1)
    );

    const second = !!(
        situation?.onSecond ||
        situation?.second ||
        athletes?.some?.(r => r?.base === 2 || r?.currentBase === 2 || r?.baseNumber === 2)
    );

    const third = !!(
        situation?.onThird ||
        situation?.third ||
        athletes?.some?.(r => r?.base === 3 || r?.currentBase === 3 || r?.baseNumber === 3)
    );

    return { first, second, third };
}

function buildBaseDiamondHTML(situation){
    const bases = getBaseOccupancy(situation);

    return `
        <span class="basepath-wrap">
            <span>Bases:</span>
            <span class="baseball-diamond" aria-label="Base runner diamond">
                <span class="base second ${bases.second ? 'on' : ''}"></span>
                <span class="base third ${bases.third ? 'on' : ''}"></span>
                <span class="base first ${bases.first ? 'on' : ''}"></span>
            </span>
        </span>
    `;
}

function buildGameState(event){
    const comp = event.competitions[0];
    const home = comp.competitors.find(t => t.homeAway === "home");
    const away = comp.competitors.find(t => t.homeAway === "away");
    const situation = getSituation(event);
    const bases = getBaseOccupancy(situation);

    return JSON.stringify({
        state: event.status.type.state,
        completed: event.status.type.completed,
        detail: event.status.type.detail,
        shortDetail: event.status.type.shortDetail,
        homeScore: home.score,
        awayScore: away.score,
        balls: situation.balls ?? null,
        strikes: situation.strikes ?? null,
        outs: situation.outs ?? null,
        onFirst: bases.first,
        onSecond: bases.second,
        onThird: bases.third,
        homeLines: (home.linescores || []).map(ls => ({
            period: ls.period ?? null,
            value: ls.value ?? "",
            displayValue: ls.displayValue ?? ""
        })),
        awayLines: (away.linescores || []).map(ls => ({
            period: ls.period ?? null,
            value: ls.value ?? "",
            displayValue: ls.displayValue ?? ""
        }))
    });
}

function getDate(offset){
    const d = new Date();
    d.setDate(d.getDate() + offset);
    return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}

function formatGameTime(dateString){
    return new Date(dateString).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
}

function getStatusText(event){
    const situation = getSituation(event);
    const isFinal = event.status.type.completed;
    const isLive = event.status.type.state === "in";

    let inningText;

    if(isFinal){
        inningText = "Final";
    } else if(isLive){
        inningText = event.status.type.detail || event.status.type.shortDetail || "Live";
    } else {
        return formatGameTime(event.date);
    }

    if(currentLeague === "MLB" && isLive){
        const balls = situation.balls ?? 0;
        const strikes = situation.strikes ?? 0;
        const outs = situation.outs ?? 0;

        const countLine = `
            <span class="status-line">
                <span class="count-wrap">
                    <span class="count-label">Balls: ${buildDots(balls, "ball", 3)}</span>
                    <span class="count-label">Strikes: ${buildDots(strikes, "strike", 2)}</span>
                    <span class="count-label">Outs: ${buildDots(outs, "out", 3)}</span>
                </span>
            </span>
        `;

        const baseLine = `
            <span class="status-line">
                ${buildBaseDiamondHTML(situation)}
            </span>
        `;

        return `
            <span class="status-line"><strong>${inningText}</strong></span>
            ${countLine}
            ${baseLine}
        `;
    }

    return inningText;
}

function normalizeLineScore(line, index){
    return {
        key: String(line?.period ?? index + 1),
        label: String(line?.period ?? index + 1),
        value: line?.displayValue ?? line?.value ?? ""
    };
}

function getTableData(away, home){
    const awayLines = (away.linescores || []).map(normalizeLineScore);
    const homeLines = (home.linescores || []).map(normalizeLineScore);

    if(!awayLines.length && !homeLines.length) return null;

    const allKeys = [];
    const keyMap = new Map();

    [...awayLines, ...homeLines].forEach((line, idx) => {
        if(!keyMap.has(line.key)){
            keyMap.set(line.key, {
                key: line.key,
                label: line.label || String(idx + 1)
            });
            allKeys.push(line.key);
        }
    });

    allKeys.sort((a, b) => {
        const na = Number(a);
        const nb = Number(b);
        const aNum = !Number.isNaN(na);
        const bNum = !Number.isNaN(nb);
        if(aNum && bNum) return na - nb;
        if(aNum) return -1;
        if(bNum) return 1;
        return a.localeCompare(b, undefined, { numeric:true, sensitivity:"base" });
    });

    const awayMap = new Map(awayLines.map(line => [line.key, line.value]));
    const homeMap = new Map(homeLines.map(line => [line.key, line.value]));

    return {
        columns: allKeys.map(key => ({
            key,
            label: keyMap.get(key)?.label || key
        })),
        away: {
            abbr: away.team.abbreviation,
            values: allKeys.map(key => awayMap.get(key) ?? ""),
            total: away.score ?? ""
        },
        home: {
            abbr: home.team.abbreviation,
            values: allKeys.map(key => homeMap.get(key) ?? ""),
            total: home.score ?? ""
        }
    };
}

function wrapCellValue(value){
    return `<span class="cell-value">${value ?? ""}</span>`;
}

function buildTableHTML(away, home){
    const tableData = getTableData(away, home);
    if(!tableData) return "";

    const header = tableData.columns.map(col => `<th data-col-key="${col.key}">${col.label}</th>`).join("");

    const awayCells = tableData.away.values
        .map((value, idx) => `<td data-col-key="${tableData.columns[idx].key}">${wrapCellValue(value)}</td>`)
        .join("");

    const homeCells = tableData.home.values
        .map((value, idx) => `<td data-col-key="${tableData.columns[idx].key}">${wrapCellValue(value)}</td>`)
        .join("");

    return `
        <div class="scoreboard">
            <table>
                <thead>
                    <tr>
                        <th></th>
                        ${header}
                        <th>T</th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="away-row">
                        <td class="team-cell">${tableData.away.abbr}</td>
                        ${awayCells}
                        <td class="total-cell" data-col-key="total">${wrapCellValue(tableData.away.total)}</td>
                    </tr>
                    <tr class="home-row">
                        <td class="team-cell">${tableData.home.abbr}</td>
                        ${homeCells}
                        <td class="total-cell" data-col-key="total">${wrapCellValue(tableData.home.total)}</td>
                    </tr>
                </tbody>
            </table>
        </div>
    `;
}

function animateChangedValue(element, newValue){
    if(!element) return;

    let target = element.querySelector(".cell-value");

    if(!target){
        const currentText = element.textContent.trim();
        element.textContent = "";
        target = document.createElement("span");
        target.className = "cell-value";
        target.textContent = currentText;
        element.appendChild(target);
    }

    const oldValue = target.textContent.trim();
    const nextValue = String(newValue ?? "").trim();

    if(oldValue === nextValue) return;

    target.textContent = nextValue;
    target.classList.remove("number-changed");
    void target.offsetWidth;
    target.classList.add("number-changed");
}

function animateTextSpan(span, newValue){
    if(!span) return;

    const oldValue = span.textContent.trim();
    const nextValue = String(newValue ?? "").trim();

    if(oldValue === nextValue) return;

    span.textContent = nextValue;
    span.classList.remove("number-changed");
    void span.offsetWidth;
    span.classList.add("number-changed");
}

function ensureScoreLines(gameDiv, isLive){
    let scoreDiv = gameDiv.querySelector(".score-lines");

    if(!scoreDiv){
        scoreDiv = document.createElement("div");
        scoreDiv.className = "score-lines";
        scoreDiv.innerHTML = `
            ${isLive ? '<div class="divider score-divider"></div>' : '<div class="spacer score-divider"></div>'}
            <div><strong><span class="team-name top-team-name"></span> - <span class="score-value top-team-score cell-value"></span></strong></div>
            <div><span class="team-name bottom-team-name"></span> - <span class="score-value bottom-team-score cell-value"></span></div>
            <div class="spacer"></div>
        `;

        const pitchersDiv = gameDiv.querySelector(".pitchers");
        if(pitchersDiv){
            pitchersDiv.insertAdjacentElement("afterend", scoreDiv);
        } else {
            const teamLine = gameDiv.querySelector(".team-line");
            teamLine.insertAdjacentElement("afterend", scoreDiv);
        }
    }

    const divider = scoreDiv.querySelector(".score-divider");
    if(divider){
        divider.className = (isLive ? "divider" : "spacer") + " score-divider";
    }

    return scoreDiv;
}

function updateScoreLines(gameDiv, topTeam, bottomTeam, isLive, isFinal){
    if(!isLive && !isFinal){
        const oldScore = gameDiv.querySelector(".score-lines");
        if(oldScore) oldScore.remove();
        return;
    }

    const scoreDiv = ensureScoreLines(gameDiv, isLive);

    const topNameEl = scoreDiv.querySelector(".top-team-name");
    const bottomNameEl = scoreDiv.querySelector(".bottom-team-name");
    const topScoreEl = scoreDiv.querySelector(".top-team-score");
    const bottomScoreEl = scoreDiv.querySelector(".bottom-team-score");

    if(topNameEl) topNameEl.textContent = topTeam.team.displayName;
    if(bottomNameEl) bottomNameEl.textContent = bottomTeam.team.displayName;
    animateTextSpan(topScoreEl, topTeam.score ?? "");
    animateTextSpan(bottomScoreEl, bottomTeam.score ?? "");
}

function updateStatusUI(gameDiv, event){
    const statusText = getStatusText(event);
    const statusDiv = gameDiv.querySelector(".game-status");

    if(statusDiv && statusDiv.innerHTML !== statusText){
        statusDiv.innerHTML = statusText;
    }

    const isLive = event.status.type.state === "in";
    const teamLine = gameDiv.querySelector(".team-line");
    const existingBadge = teamLine?.querySelector(".live-badge");

    if(isLive && !existingBadge){
        const badge = document.createElement("span");
        badge.className = "live-badge";
        badge.textContent = "LIVE";
        teamLine.prepend(badge);
    } else if(!isLive && existingBadge){
        existingBadge.remove();
    }

    const divider = gameDiv.querySelector(".status-divider");
    if(isLive){
        if(!divider){
            const newDivider = document.createElement("div");
            newDivider.className = "divider status-divider";
            statusDiv?.insertAdjacentElement("afterend", newDivider);
        } else {
            divider.className = "divider status-divider";
        }
    } else if(divider){
        divider.remove();
    }
}

function updateScoreboardTable(gameDiv, away, home){
    const newTableData = getTableData(away, home);
    let scoreboard = gameDiv.querySelector(".scoreboard");

    if(!newTableData){
        if(scoreboard){
            scoreboard.remove();
            const spacerAfterTable = gameDiv.querySelector(".table-spacers");
            if(spacerAfterTable) spacerAfterTable.remove();
        }
        return;
    }

    if(!scoreboard){
        const statusDiv = gameDiv.querySelector(".game-status");
        if(statusDiv){
            statusDiv.insertAdjacentHTML("beforebegin", buildTableHTML(away, home) + `<div class="table-spacers"><div class="spacer"></div><div class="spacer"></div></div>`);
            return;
        }
    }

    scoreboard = gameDiv.querySelector(".scoreboard");
    if(!scoreboard) return;

    const existingHeaderKeys = Array.from(scoreboard.querySelectorAll("thead th[data-col-key]")).map(th => th.dataset.colKey);
    const newHeaderKeys = newTableData.columns.map(col => col.key);

    const structureChanged =
        existingHeaderKeys.length !== newHeaderKeys.length ||
        existingHeaderKeys.some((key, idx) => key !== newHeaderKeys[idx]);

    if(structureChanged){
        const wrapper = document.createElement("div");
        wrapper.innerHTML = buildTableHTML(away, home);
        scoreboard.replaceWith(wrapper.firstElementChild);
        return;
    }

    const awayRow = scoreboard.querySelector(".away-row");
    const homeRow = scoreboard.querySelector(".home-row");

    if(!awayRow || !homeRow){
        const wrapper = document.createElement("div");
        wrapper.innerHTML = buildTableHTML(away, home);
        scoreboard.replaceWith(wrapper.firstElementChild);
        return;
    }

    const awayTeamCell = awayRow.querySelector(".team-cell");
    const homeTeamCell = homeRow.querySelector(".team-cell");
    if(awayTeamCell) awayTeamCell.textContent = newTableData.away.abbr;
    if(homeTeamCell) homeTeamCell.textContent = newTableData.home.abbr;

    newTableData.columns.forEach((col, idx) => {
        animateChangedValue(awayRow.querySelector(`td[data-col-key="${col.key}"]`), newTableData.away.values[idx] ?? "");
        animateChangedValue(homeRow.querySelector(`td[data-col-key="${col.key}"]`), newTableData.home.values[idx] ?? "");
    });

    animateChangedValue(awayRow.querySelector(`td[data-col-key="total"]`), newTableData.away.total ?? "");
    animateChangedValue(homeRow.querySelector(`td[data-col-key="total"]`), newTableData.home.total ?? "");
}

function renderGame(event, grid){
    const comp = event.competitions[0];
    const home = comp.competitors.find(t => t.homeAway === "home");
    const away = comp.competitors.find(t => t.homeAway === "away");

    const isLive = event.status.type.state === "in";
    const isFinal = event.status.type.completed;
    const [topTeam, bottomTeam] = getSortedTeams(home, away);
    const statusText = getStatusText(event);
    const tableHTML = buildTableHTML(away, home);

    let scoreHTML = "";
    if(isLive || isFinal){
        scoreHTML = `
            <div class="score-lines">
                ${isLive ? '<div class="divider score-divider"></div>' : '<div class="spacer score-divider"></div>'}
                <div><strong><span class="team-name top-team-name">${topTeam.team.displayName}</span> - <span class="score-value top-team-score cell-value">${topTeam.score ?? ""}</span></strong></div>
                <div><span class="team-name bottom-team-name">${bottomTeam.team.displayName}</span> - <span class="score-value bottom-team-score cell-value">${bottomTeam.score ?? ""}</span></div>
                <div class="spacer"></div>
            </div>
        `;
    }

    let broadcast = "";
    if(!isFinal && comp.broadcasts?.length){
        broadcast = comp.broadcasts.flatMap(b => b.names || []).join(", ");
    }

    const gameDiv = document.createElement("div");
    gameDiv.className = "game";
    gameDiv.dataset.eventId = event.id;

    gameDiv.innerHTML = `
        <div class="team-line">
            ${isLive ? '<span class="live-badge">LIVE</span>' : ''}
            <img src="${away.team.logo}" alt="${away.team.abbreviation} logo">${away.team.abbreviation} @
            <img src="${home.team.logo}" alt="${home.team.abbreviation} logo">${home.team.abbreviation}
        </div>

        ${currentLeague === "MLB" ? `
        <div class="pitchers">
            <div>${away.team.abbreviation}: ${formatPitcher(away.probables?.[0])}</div>
            <div>${home.team.abbreviation}: ${formatPitcher(home.probables?.[0])}</div>
        </div>` : ""}

        ${scoreHTML}
        ${tableHTML}
        ${tableHTML ? `<div class="table-spacers"><div class="spacer"></div><div class="spacer"></div></div>` : ""}

        <div class="status game-status">${statusText}</div>
        ${isLive ? '<div class="divider status-divider"></div>' : ""}
        ${broadcast ? `<div class="status watch-line"><small>Watch: ${broadcast}</small></div>` : ""}
    `;

    grid.appendChild(gameDiv);
    gameStateMap[event.id] = buildGameState(event);
}

async function loadGames(){
    containerDiv.innerHTML = "";
    gameStateMap = {};

    const endpoint = leagues[currentLeague];
    const offsets = [0, 1, -1];
    const titles = ["Today's Games", "Tomorrow's Games", "Yesterday's Games"];
    const seenIds = new Set();

    let allEvents = [];

    for(let i = 0; i < offsets.length; i++){
        const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/${endpoint}/scoreboard?dates=${getDate(offsets[i])}`);
        const data = await res.json();

        if(!data.events) continue;

        data.events.forEach(e => {
            if(!seenIds.has(e.id)){
                seenIds.add(e.id);
                allEvents.push({ event: e, offsetIndex: i });
            }
        });
    }

    const liveEvents = allEvents.filter(e => e.event.status.type.state === "in");
    const groupedEvents = [[], [], []];

    allEvents.forEach(e => {
        if(e.event.status.type.state !== "in"){
            groupedEvents[e.offsetIndex].push(e.event);
        }
    });

    if(liveEvents.length){
        const liveHeader = document.createElement("div");
        liveHeader.className = "section-title live-header";
        liveHeader.innerText = "🔴 Live Games";
        containerDiv.appendChild(liveHeader);

        const liveGrid = document.createElement("div");
        liveGrid.className = "content live-grid";
        containerDiv.appendChild(liveGrid);

        liveEvents
            .map(e => e.event)
            .sort((a,b) => new Date(a.date) - new Date(b.date))
            .forEach(e => renderGame(e, liveGrid));
    }

    groupedEvents.forEach((events, i) => {
        if(!events.length) return;

        const title = document.createElement("div");
        title.className = "section-title";
        title.innerText = titles[i];
        containerDiv.appendChild(title);

        const grid = document.createElement("div");
        grid.className = "content";
        containerDiv.appendChild(grid);

        events
            .sort((a,b) => new Date(a.date) - new Date(b.date))
            .forEach(e => renderGame(e, grid));
    });
}

async function fetchEventsForRefresh(){
    const endpoint = leagues[currentLeague];
    const offsets = [0, -1, 1];
    const allEvents = [];
    const seen = new Set();

    for(const offset of offsets){
        const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/${endpoint}/scoreboard?dates=${getDate(offset)}`);
        const data = await res.json();

        for(const event of (data.events || [])){
            if(seen.has(event.id)) continue;
            seen.add(event.id);
            allEvents.push(event);
        }
    }

    return allEvents;
}

async function refreshLiveGames(){
    if(refreshInFlight) return;
    refreshInFlight = true;

    try {
        const events = await fetchEventsForRefresh();
        let requiresReload = false;
        let liveGameJustStarted = false;

        for(const event of events){
            const gameDiv = document.querySelector(`[data-event-id="${event.id}"]`);
            const isLive = event.status.type.state === "in";

            if(!gameDiv){
                if(isLive){
                    requiresReload = true;
                    liveGameJustStarted = true;
                }
                continue;
            }

            const previousState = gameStateMap[event.id];
            const newState = buildGameState(event);

            let previousParsed = null;
            try {
                previousParsed = previousState ? JSON.parse(previousState) : null;
            } catch (e) {
                previousParsed = null;
            }

            const comp = event.competitions[0];
            const home = comp.competitors.find(t => t.homeAway === "home");
            const away = comp.competitors.find(t => t.homeAway === "away");
            const isFinal = event.status.type.completed;

            updateStatusUI(gameDiv, event);

            const [topTeam, bottomTeam] = getSortedTeams(home, away);
            updateScoreLines(gameDiv, topTeam, bottomTeam, isLive, isFinal);
            updateScoreboardTable(gameDiv, away, home);

            gameStateMap[event.id] = newState;

            const previousLive = previousParsed?.state === "in";
            const previousCompleted = previousParsed?.completed === true;

            if(previousParsed && previousLive !== isLive){
                requiresReload = true;
                if(!previousLive && isLive){
                    liveGameJustStarted = true;
                }
            }

            if(previousParsed && previousCompleted !== isFinal){
                requiresReload = true;
            }
        }

        if(requiresReload){
            await loadGames();

            if(liveGameJustStarted){
                const liveHeader = document.querySelector(".live-header");
                if(liveHeader){
                    liveHeader.scrollIntoView({
                        behavior: "smooth",
                        block: "start"
                    });
                }
            }
        }
    } catch (err) {
        console.error("Refresh failed:", err);
    } finally {
        refreshInFlight = false;
    }
}

loadGames();
setInterval(refreshLiveGames, 10000);
</script>
