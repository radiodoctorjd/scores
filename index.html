<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sports Scores Dashboard</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #0f172a;
    color: white;
}
header {
    padding: 15px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
    background: #020617;
}
.tabs {
    display: flex;
    overflow-x: auto;
    background: #1e293b;
    position: sticky;
    top: 0;
    z-index: 1000;
}
.tab {
    padding: 12px 18px;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    display: flex;
    align-items: center;
}
.tab img {
    width: 20px;
    height: 20px;
    margin-right: 6px;
}
.tab.active {
    border-bottom: 3px solid #38bdf8;
    background: #0f172a;
}
.section-title {
    font-weight: bold;
    font-size: 18px;
    margin: 10px 0 5px;
    text-align: center;
}
.content {
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
}
/* 2 columns for medium screens (tablets) */
@media (max-width:1024px){
    .content{
        grid-template-columns: repeat(2,1fr);
    }
}
/* 1 column for small screens (phones) */
@media (max-width: 768px){
    .content{
        grid-template-columns: 1fr;
        padding: 15px;
        gap: 10px;
    }
}
.game {
    background: white;
    color: black;
    padding: 10px;
    border-radius: 8px;
}
.team-line { display: flex; align-items: center; gap: 8px; }
.team-line img { width: 28px; height: 28px; }
.team-abbr { font-weight: bold; }
.team-fullname { font-weight: bold; }
.spacer { height: 6px; }
.status { font-size: 14px; color: #333; margin-top: 5px; }
.status small { font-size: 12px; color: #555; }
.divider { border-top: 1px solid #ddd; margin: 6px 0; }
/* Pulsing LIVE badge */
@keyframes pulse {0%{transform:scale(1);opacity:1;}50%{transform:scale(1.2);opacity:0.8;}100%{transform:scale(1);opacity:1;}}
.live-badge {
    background:red;
    color:white;
    font-size:11px;
    font-weight:bold;
    padding:2px 6px;
    border-radius:10px;
    margin-right:6px;
    animation:pulse 1s infinite;
}
</style>
</head>
<body>
<header>Sports Scores Dashboard</header>
<div class="tabs" id="tabs"></div>
<div id="content-container"></div>

<script>
const leagues = {
    NHL:"hockey/nhl", MLB:"baseball/mlb", NFL:"football/nfl",
    NBA:"basketball/nba", WNBA:"basketball/wnba",
    NCAAMB:"basketball/mens-college-basketball"
};
const leagueLogos = {
    NHL:"images/nhl.svg", MLB:"images/mlb.svg", NFL:"images/nfl.svg",
    NBA:"images/nba.svg", WNBA:"images/wnba.svg", NCAAMB:"images/ncaamb.svg"
};
let currentLeague="NHL";
const tabsDiv=document.getElementById("tabs");
const containerDiv=document.getElementById("content-container");
const liveGameElements={};

// Setup tabs
Object.keys(leagues).forEach(league=>{
    const tab=document.createElement("div");
    tab.className="tab"+(league===currentLeague?" active":"");
    const img=document.createElement("img"); img.src=leagueLogos[league];
    tab.appendChild(img); tab.appendChild(document.createTextNode(league));
    tab.onclick=()=>{document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active")); tab.classList.add("active"); currentLeague=league; loadGames();}
    tabsDiv.appendChild(tab);
});

// Helpers
function getDateString(offset){
    const d=new Date(); d.setDate(d.getDate()+offset);
    const y=d.getFullYear();
    const m=String(d.getMonth()+1).padStart(2,'0');
    const day=String(d.getDate()).padStart(2,'0');
    return `${y}${m}${day}`;
}

// Load games
async function loadGames(){
    containerDiv.innerHTML="";
    Object.keys(liveGameElements).forEach(k=>delete liveGameElements[k]);
    const endpoint=leagues[currentLeague]; let hasGames=false; let todayOrTomorrowHasGames=false; let upcomingShown=false;
    const sectionOffsets=[0,1,-1]; const sectionTitles=["Today's Games","Tomorrow's Games","Yesterday's Games"];
    for(let i=0;i<sectionOffsets.length;i++){
        let offset=sectionOffsets[i]; let dateStr=getDateString(offset);
        try{
            const res=await fetch(`https://site.api.espn.com/apis/site/v2/sports/${endpoint}/scoreboard?dates=${dateStr}`);
            const data=await res.json(); const events=data.events; if(!events||events.length===0) continue;
            hasGames=true; if(i<=1&&events.length>0) todayOrTomorrowHasGames=true;
            let title=sectionTitles[i]; 
            if(!todayOrTomorrowHasGames&&!upcomingShown&&offset>1){ 
                const d=new Date(); d.setDate(d.getDate()+offset); 
                title=`Upcoming Games (${d.toLocaleDateString([],{weekday:'long',month:'short',day:'numeric'})})`; 
                upcomingShown=true;
            }
            const titleDiv=document.createElement("div"); titleDiv.className="section-title"; titleDiv.innerText=title; containerDiv.appendChild(titleDiv);
            const contentDiv=document.createElement("div"); contentDiv.className="content"; containerDiv.appendChild(contentDiv);

            events.sort((a,b)=>{
                const aLive=a.status.type.state==="in",bLive=b.status.type.state==="in";
                const aFinal=a.status.type.completed,bFinal=b.status.type.completed;
                if(aLive&&!bLive) return -1;
                if(!aLive&&bLive) return 1;
                if(!aLive&&!aFinal&&!bLive&&!bFinal) return new Date(a.date)-new Date(b.date);
                if(aFinal&&!bFinal) return 1;
                if(!aFinal&&bFinal) return -1;
                return new Date(a.date)-new Date(b.date);
            }).forEach(event=>{
                const comp=event.competitions[0]; const teams=comp.competitors;
                const home=teams.find(t=>t.homeAway==="home"); const away=teams.find(t=>t.homeAway==="away");
                const isFinal=event.status.type.completed; const isLive=event.status.type.state==="in";
                let displayStatus="", showScore=false;
                if(isFinal){ displayStatus="Final"; showScore=true;} 
                else if(isLive){ displayStatus=event.status.type.detail; showScore=true;} 
                else{ displayStatus=new Date(event.date).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});}
                let broadcast=""; if(!isFinal && comp.broadcasts?.length) broadcast=comp.broadcasts.map(b=>b.names).join(", ");
                let scoreHTML=""; 
                if(showScore){ 
                    let winner=Number(home.score)>=Number(away.score)?home:away; 
                    let loser=winner===home?away:home;
                    scoreHTML=`${isLive?'<div class="divider"></div>':'<div class="spacer"></div>'}<div class="team-fullname">${winner.team.displayName} ${winner.score}</div><div class="team-fullname">${loser.team.displayName} ${loser.score}</div><div class="spacer"></div>`;
                }
                const gameId=event.id; const scoreId=`score-${gameId}`; const statusId=`status-${gameId}`;
                const gameDiv=document.createElement("div"); gameDiv.className="game";

                gameDiv.innerHTML=`
                    <div class="team-line">${isLive?'<span class="live-badge">LIVE</span>':''}
                    <img src="${away.team.logo}"><span class="team-abbr">${away.team.abbreviation}</span> @
                    <img src="${home.team.logo}"><span class="team-abbr">${home.team.abbreviation}</span>
                    </div>
                    <div class="spacer"></div>
                    <div id="${scoreId}">${scoreHTML}</div>
                    <div id="${statusId}" class="status">${displayStatus}</div>
                    ${isLive?'<div class="divider"></div>' : ''}
                    ${broadcast?`<div class="status"><small>Watch: ${broadcast}</small></div>`:""}
                `;
                contentDiv.appendChild(gameDiv);
                if(isLive) liveGameElements[gameId]={scoreId,statusId};
            });
        } catch(err){console.error(err);}
    }
    if(!hasGames) containerDiv.innerHTML="<div class='section-title'>No games scheduled</div>";
}

// Refresh live games
async function refreshLiveGames(){
    const endpoint=leagues[currentLeague]; const today=getDateString(0);
    try{
        const res=await fetch(`https://site.api.espn.com/apis/site/v2/sports/${endpoint}/scoreboard?dates=${today}`);
        const data=await res.json();
        data.events.forEach(event=>{
            const refs=liveGameElements[event.id]; if(!refs) return;
            const comp=event.competitions[0]; const teams=comp.competitors;
            const home=teams.find(t=>t.homeAway==="home"); const away=teams.find(t=>t.homeAway==="away");
            if(event.status.type.state!=="in") return;
            let winner=Number(home.score)>=Number(away.score)?home:away; let loser=winner===home?away:home;
            const scoreHTML=`<div class="divider"></div><div class="team-fullname">${winner.team.displayName} ${winner.score}</div><div class="team-fullname">${loser.team.displayName} ${loser.score}</div><div class="spacer"></div>`;
            const scoreEl=document.getElementById(refs.scoreId); const statusEl=document.getElementById(refs.statusId);
            if(scoreEl) scoreEl.innerHTML=scoreHTML; if(statusEl) statusEl.innerText=event.status.type.detail;
        });
    } catch(err){console.error("Live update failed",err);}
}

// Initial load & refresh
loadGames(); setInterval(refreshLiveGames,15000);
</script>
</body>
</html>
