<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sports Scores Dashboard</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #0f172a;
    color: white;
}
header {
    padding: 15px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
    background: #020617;
}
.tabs {
    display: flex;
    overflow-x: auto;
    background: #1e293b;
}
.tab {
    padding: 12px 18px;
    cursor: pointer;
    border-bottom: 3px solid transparent;
}
.tab.active {
    border-bottom: 3px solid #38bdf8;
    background: #0f172a;
}
.section-title {
    font-weight: bold;
    font-size: 18px;
    margin: 10px 0 5px;
    text-align: center;
}
.content {
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
}
@media (max-width: 1024px) {
    .content {
        grid-template-columns: repeat(2, 1fr);
    }
}
@media (max-width: 768px) {
    .content {
        grid-template-columns: 1fr;
    }
}
.game {
    background: white;
    color: black;
    padding: 10px;
    border-radius: 8px;
}
.team-line {
    display: flex;
    align-items: center;
    gap: 8px;
}
.team-line img {
    width: 28px;
    height: 28px;
}
.team-abbr {
    font-weight: bold;
}
.team-fullname {
    font-weight: bold;
}
.score {
    font-weight: bold;
    margin-left: 6px;
    font-size: 16px;
}
.spacer {
    height: 5px;
}
.status {
    font-size: 14px;
    color: #333;
    margin-top: 5px;
}
.status small {
    font-size: 12px;
    color: #555;
}
</style>
</head>
<body>

<header>Sports Scores Dashboard</header>

<div class="tabs" id="tabs"></div>
<div id="content-container"></div>

<script>
const leagues = {
    NHL: "hockey/nhl",
    MLB: "baseball/mlb",
    NFL: "football/nfl",
    NBA: "basketball/nba",
    WNBA: "basketball/wnba",
    NCAAMB: "basketball/mens-college-basketball"
};

let currentLeague = "NHL";
const tabsDiv = document.getElementById("tabs");
const containerDiv = document.getElementById("content-container");

function getDateString(offset) {
    const d = new Date();
    d.setDate(d.getDate() + offset);
    return d.toISOString().split("T")[0].replace(/-/g, "");
}

Object.keys(leagues).forEach(league => {
    const tab = document.createElement("div");
    tab.className = "tab" + (league === currentLeague ? " active" : "");
    tab.innerText = league;
    tab.onclick = () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        currentLeague = league;
        loadGames();
    };
    tabsDiv.appendChild(tab);
});

async function loadGames() {
    containerDiv.innerHTML = "";
    const endpoint = leagues[currentLeague];
    const offsets = [0, 1, -1];
    const sectionTitles = ["Today's Games", "Tomorrow's Games", "Yesterday's Games"];
    let hasGames = false;

    for (let i = 0; i < offsets.length; i++) {
        const offset = offsets[i];
        const dateStr = getDateString(offset);

        try {
            const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/${endpoint}/scoreboard?dates=${dateStr}`);
            const data = await res.json();
            const events = data.events;

            if (!events || events.length === 0) continue;
            hasGames = true;

            const titleDiv = document.createElement("div");
            titleDiv.className = "section-title";
            titleDiv.innerText = sectionTitles[i];
            containerDiv.appendChild(titleDiv);

            const contentDiv = document.createElement("div");
            contentDiv.className = "content";
            containerDiv.appendChild(contentDiv);

            events.forEach(event => {
                const comp = event.competitions[0];
                const teams = comp.competitors;

                const home = teams.find(t => t.homeAway === "home");
                const away = teams.find(t => t.homeAway === "away");

                const isFinal = event.status.type.completed;
                const state = event.status.type.state;

                let displayStatus = "";
                let showScore = false;

                if (isFinal) {
                    displayStatus = "Final";
                    showScore = true;
                } else if (state === "in") {
                    displayStatus = "LIVE - " + event.status.type.detail;
                    showScore = true;
                } else {
                    const gameTime = new Date(event.date).toLocaleTimeString([], {
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                    displayStatus = gameTime;
                }

                let broadcast = "";
                if (!isFinal && comp.broadcasts && comp.broadcasts.length > 0) {
                    broadcast = comp.broadcasts.map(b => b.names).join(", ");
                }

                const gameDiv = document.createElement("div");
                gameDiv.className = "game";

                let scoreHTML = "";
                if (showScore) {
                    let winner, loser;
                    if (Number(home.score) >= Number(away.score)) {
                        winner = home;
                        loser = away;
                    } else {
                        winner = away;
                        loser = home;
                    }

                    scoreHTML = `
                        <div class="spacer"></div>
                        <div class="line team-fullname">${winner.team.displayName} ${winner.score}</div>
                        <div class="line team-fullname">${loser.team.displayName} ${loser.score}</div>
                        <div class="spacer"></div>
                    `;
                }

                const matchupHTML = `
                    <div class="team-line">
                        <img src="${away.team.logo}" alt="${away.team.abbreviation} logo">
                        <span class="team-abbr">${away.team.abbreviation}</span>
                        <span>@</span>
                        <img src="${home.team.logo}" alt="${home.team.abbreviation} logo">
                        <span class="team-abbr">${home.team.abbreviation}</span>
                    </div>
                    <div class="spacer"></div>
                    ${scoreHTML}
                    <div class="line">${displayStatus}</div>
                    ${broadcast ? `<div class="status"><small>Watch: ${broadcast}</small></div>` : ""}
                `;

                gameDiv.innerHTML = matchupHTML;
                contentDiv.appendChild(gameDiv);
            });

        } catch (err) {
            console.error(err);
        }
    }

    if (!hasGames) containerDiv.innerHTML = "";
}

loadGames();
</script>

</body>
</html>
