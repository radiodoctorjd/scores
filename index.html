<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sports Scores Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: Arial, sans-serif; margin:0; background:#0f172a; color:white; }
header { padding:15px; text-align:center; font-size:24px; font-weight:bold; background:#020617; }
.tabs { display:flex; overflow-x:auto; background:#1e293b; position:sticky; top:0; z-index:1000; }
.tab { padding:12px 18px; cursor:pointer; display:flex; align-items:center; }
.tab img { width:20px; margin-right:6px; }
.tab.active { border-bottom:3px solid #38bdf8; background:#0f172a; }

.section-title { text-align:center; font-weight:bold; margin:10px 0; }

.content { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; padding:20px; }
@media(max-width:1024px){ .content { grid-template-columns:repeat(2,1fr); } }
@media(max-width:800px){ .content { grid-template-columns:1fr; } }

.game { background:white; color:black; padding:12px; border-radius:10px; }

.team-line { display:flex; align-items:center; gap:8px; font-weight:bold; }
.team-line img { width:26px; }

.spacer { height:6px; }
.divider { border-top:1px solid #ddd; margin:6px 0; }

.status { font-size:14px; color:#333; }
.status small { font-size:12px; }

@keyframes pulse {0%{transform:scale(1);}50%{transform:scale(1.2);}100%{transform:scale(1);}}
.live-badge { background:red; color:white; font-size:11px; padding:2px 6px; border-radius:10px; margin-right:6px; animation:pulse 1s infinite; }

.scoreboard { margin-top:8px; font-size:12px; overflow-x:auto; }
.scoreboard table { width:100%; border-collapse:collapse; }
.scoreboard th, .scoreboard td { padding:4px 6px; text-align:center; }
.scoreboard th { color:#555; font-weight:600; border-bottom:1px solid #ccc; }
.scoreboard td { border-bottom:1px solid #eee; }
.team-cell { text-align:left !important; font-weight:bold; padding-right:8px; }
.total-cell { font-weight:bold; }
</style>
</head>
<body>
<header>Sports Scores Dashboard</header>
<div class="tabs" id="tabs"></div>
<div id="content-container"></div>

<script>
const leagues={
    NHL:"hockey/nhl",
    MLB:"baseball/mlb",
    NFL:"football/nfl",
    NBA:"basketball/nba",
    WNBA:"basketball/wnba",
    NCAAMB:"basketball/mens-college-basketball"
};
const leagueLogos={
    NHL:"images/nhl.svg",
    MLB:"images/mlb.svg",
    NFL:"images/nfl.svg",
    NBA:"images/nba.svg",
    WNBA:"images/wnba.svg",
    NCAAMB:"images/ncaamb.svg"
};

let currentLeague="NHL";
const tabsDiv=document.getElementById("tabs");
const containerDiv=document.getElementById("content-container");
let liveGamesMap={};

// Tabs
Object.keys(leagues).forEach(l=>{
    const tab=document.createElement("div");
    tab.className="tab"+(l===currentLeague?" active":"");
    tab.innerHTML=`<img src="${leagueLogos[l]}">${l}`;
    tab.onclick=()=>{
        document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
        tab.classList.add("active");
        currentLeague=l;
        loadGames();
    };
    tabsDiv.appendChild(tab);
});

function getDate(offset){
    const d=new Date();
    d.setDate(d.getDate()+offset);
    return d.toISOString().split("T")[0].replace(/-/g,"");
}

// Build scoreboard table
function buildTable(away, home){
    if(!away.linescores || !home.linescores) return "";
    const periods = Math.max(away.linescores.length, home.linescores.length);
    let header = "";
    for(let i=1;i<=periods;i++) header += `<th>${i}</th>`;
    header += "<th>T</th>";

    let awayRow = "";
    for(let i=0;i<periods;i++){
        awayRow += `<td>${away.linescores[i] ? away.linescores[i].value : ""}</td>`;
    }
    awayRow += `<td class="total-cell">${away.score}</td>`;

    let homeRow = "";
    for(let i=0;i<periods;i++){
        homeRow += `<td>${home.linescores[i] ? home.linescores[i].value : ""}</td>`;
    }
    homeRow += `<td class="total-cell">${home.score}</td>`;

    return `
    <div class="scoreboard">
        <table>
            <thead><tr><th></th>${header}</tr></thead>
            <tbody>
                <tr><td class="team-cell">${away.team.abbreviation}</td>${awayRow}</tr>
                <tr><td class="team-cell">${home.team.abbreviation}</td>${homeRow}</tr>
            </tbody>
        </table>
    </div>`;
}

// Load all games
async function loadGames(){
    containerDiv.innerHTML=""; liveGamesMap={};
    const endpoint=leagues[currentLeague];
    const offsets=[0,1,-1]; const titles=["Today's Games","Tomorrow's Games","Yesterday's Games"];
    for(let i=0;i<offsets.length;i++){
        const res=await fetch(`https://site.api.espn.com/apis/site/v2/sports/${endpoint}/scoreboard?dates=${getDate(offsets[i])}`);
        const data=await res.json();
        if(!data.events||data.events.length===0) continue;
        const title=document.createElement("div"); title.className="section-title"; title.innerText=titles[i]; containerDiv.appendChild(title);
        const grid=document.createElement("div"); grid.className="content"; containerDiv.appendChild(grid);

        data.events.forEach(event=>{
            const comp=event.competitions[0]; const teams=comp.competitors;
            const home=teams.find(t=>t.homeAway==="home"); const away=teams.find(t=>t.homeAway==="away");
            const isLive=event.status.type.state==="in"; const isFinal=event.status.type.completed;
            const statusText=isFinal?"Final":(isLive?event.status.type.detail:new Date(event.date).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}));

            // Winner first, loser second
            let scoreHTML=""; 
            if(isLive||isFinal){ 
                const w=home.score>=away.score?home:away;
                const l=w===home?away:home;
                scoreHTML=`<div class="score-lines">
                    ${isLive?'<div class="divider"></div>':'<div class="spacer"></div>'}
                    <div>${w.team.displayName} - ${w.score}</div>
                    <div>${l.team.displayName} - ${l.score}</div>
                    <div class="spacer"></div>
                </div>`;
            }

            let tableHTML=buildTable(away,home);

            // Starting pitchers for MLB before game
            let pitchers=""; if(currentLeague==="MLB"&&!isLive&&!isFinal){
                const ap=away.probables?.[0]; const hp=home.probables?.[0];
                if(ap||hp){ pitchers=`<div class="status"><small>${ap?away.team.abbreviation+": "+ap.athlete.displayName:""}${ap&&hp?" | ":""}${hp?home.team.abbreviation+": "+hp.athlete.displayName:""}</small></div>`;}
            }

            // Broadcast
            let broadcast=""; if(!isFinal && comp.broadcasts?.length) broadcast=comp.broadcasts.map(b=>b.names).join(", ");

            const gameDiv=document.createElement("div"); gameDiv.className="game"; gameDiv.dataset.eventId=event.id;
            gameDiv.innerHTML=`
                <div class="team-line">${isLive?'<span class="live-badge">LIVE</span>':''}<img src="${away.team.logo}">${away.team.abbreviation} @ <img src="${home.team.logo}">${home.team.abbreviation}</div>
                ${pitchers}<div class="spacer"></div>
                ${scoreHTML}
                ${tableHTML}${tableHTML?'<div class="spacer"></div><div class="spacer"></div>':''}
                <div class="status">${statusText}</div>
                ${isLive?'<div class="divider"></div>':''}
                ${broadcast ? `<div class="status"><small>Watch: ${broadcast}</small></div>` : ""}
            `;
            grid.appendChild(gameDiv);

            if(isLive) liveGamesMap[event.id]=gameDiv;
        });
    }
}

// Refresh live games only
async function refreshLiveGames(){
    if(!Object.keys(liveGamesMap).length) return;
    const endpoint=leagues[currentLeague];
    const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/${endpoint}/scoreboard`);
    const data = await res.json();

    Object.keys(liveGamesMap).forEach(gameId=>{
        const event = data.events.find(e=>e.id===gameId); if(!event) return;
        const comp = event.competitions[0]; const home = comp.competitors.find(t=>t.homeAway==="home"); const away = comp.competitors.find(t=>t.homeAway==="away");
        const isLive = event.status.type.state==="in"; const isFinal = event.status.type.completed;
        const gameDiv = liveGamesMap[gameId];

        // Remove old score lines
        const oldScores = gameDiv.querySelectorAll(".score-lines");
        oldScores.forEach(el=>el.remove());

        // Winner first, loser second
        if(isLive||isFinal){
            const w=home.score>=away.score?home:away;
            const l=w===home?away:home;
            const scoreContainer=document.createElement("div"); scoreContainer.className="score-lines";
            scoreContainer.innerHTML=`
                <div class="divider"></div>
                <div>${w.team.displayName} - ${w.score}</div>
                <div>${l.team.displayName} - ${l.score}</div>
                <div class="spacer"></div>
            `;
            const tableEl = gameDiv.querySelector(".scoreboard");
            if(tableEl) gameDiv.insertBefore(scoreContainer, tableEl);
            else { const statusEl=gameDiv.querySelector(".status"); gameDiv.insertBefore(scoreContainer, statusEl); }
        }

        // Update scoreboard table
        const tableHTML = buildTable(away,home);
        const oldTable = gameDiv.querySelector(".scoreboard");
        if(oldTable && tableHTML) oldTable.outerHTML = tableHTML;

        // Update status
        const statusDiv=gameDiv.querySelector(".status");
        statusDiv.textContent=isFinal?"Final":(isLive?event.status.type.detail:statusDiv.textContent);
    });
}

// Init + interval
loadGames();
setInterval(refreshLiveGames,15000);
</script>
</body>
</html>
