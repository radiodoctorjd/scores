<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sports Scores Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial, sans-serif; margin:0; background:#0f172a; color:white; }
header { padding:15px; text-align:center; font-size:24px; font-weight:bold; background:#020617; }

.tabs { display:flex; overflow-x:auto; background:#1e293b; position:sticky; top:0; z-index:1000; }
.tab { padding:12px 18px; cursor:pointer; display:flex; align-items:center; }
.tab img { width:20px; margin-right:6px; }
.tab.active { border-bottom:3px solid #38bdf8; background:#0f172a; }

.section-title { text-align:center; font-weight:bold; margin:10px 0; }

.content { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; padding:20px; }
@media(max-width:1024px){ .content { grid-template-columns:repeat(2,1fr); } }
@media(max-width:800px){ .content { grid-template-columns:1fr !important; } }

.game { background:white; color:black; padding:12px; border-radius:10px; }

.team-line { display:flex; align-items:center; gap:8px; font-weight:bold; }
.team-line img { width:26px; }

.spacer { height:6px; }
.divider { border-top:1px solid #ddd; margin:6px 0; }

.status { font-size:14px; color:#333; }

.live-badge { background:red; color:white; font-size:11px; padding:2px 6px; border-radius:10px; margin-right:6px; }

.scoreboard { margin-top:8px; font-size:12px; overflow-x:auto; }
.scoreboard table { width:100%; border-collapse:collapse; }
.scoreboard th, .scoreboard td { padding:4px 6px; text-align:center; }
.team-cell { text-align:left !important; font-weight:bold; }
.total-cell { font-weight:bold; }
</style>
</head>

<body>

<header>Sports Scores Dashboard</header>
<div class="tabs" id="tabs"></div>
<div id="content-container"></div>

<script>
const leagues = {
    NHL:"hockey/nhl",
    MLB:"baseball/mlb",
    NFL:"football/nfl",
    NBA:"basketball/nba",
    WNBA:"basketball/wnba",
    NCAAMB:"basketball/mens-college-basketball"
};

const leagueLogos={
    NHL:"images/nhl.svg",
    MLB:"images/mlb.svg",
    NFL:"images/nfl.svg",
    NBA:"images/nba.svg",
    WNBA:"images/wnba.svg",
    NCAAMB:"images/ncaamb.svg"
};

let currentLeague="NHL";
const tabsDiv=document.getElementById("tabs");
const containerDiv=document.getElementById("content-container");

// Tabs
Object.keys(leagues).forEach(l=>{
    const tab=document.createElement("div");
    tab.className="tab"+(l===currentLeague?" active":"");
    tab.innerHTML=`<img src="${leagueLogos[l]}">${l}`;
    tab.onclick=()=>{
        document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
        tab.classList.add("active");
        currentLeague=l;
        loadGames();
    };
    tabsDiv.appendChild(tab);
});

// Scoreboard
function buildTable(away, home){
    if(!away.linescores || !home.linescores) return "";
    const periods=Math.max(away.linescores.length,home.linescores.length);

    let header="";
    for(let i=1;i<=periods;i++) header+=`<th>${i}</th>`;
    header+="<th>T</th>";

    let awayRow="", homeRow="";
    for(let i=0;i<periods;i++){
        awayRow+=`<td>${away.linescores[i]?.value ?? 0}</td>`;
        homeRow+=`<td>${home.linescores[i]?.value ?? 0}</td>`;
    }

    awayRow+=`<td class="total-cell">${away.score}</td>`;
    homeRow+=`<td class="total-cell">${home.score}</td>`;

    return `<div class="scoreboard"><table>
    <thead><tr><th></th>${header}</tr></thead>
    <tbody>
    <tr><td class="team-cell">${away.team.abbreviation}</td>${awayRow}</tr>
    <tr><td class="team-cell">${home.team.abbreviation}</td>${homeRow}</tr>
    </tbody></table></div>`;
}

// Render game
function renderGame(event, grid){
    const comp=event.competitions[0];
    const home=comp.competitors.find(t=>t.homeAway==="home");
    const away=comp.competitors.find(t=>t.homeAway==="away");

    const isLive=event.status.type.state==="in";
    const isFinal=event.status.type.completed;

    const statusText=isFinal?"Final":(isLive?event.status.type.detail:new Date(event.date).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}));

    let scoreHTML="";
    if(isLive||isFinal){
        const w=home.score>=away.score?home:away;
        const l=w===home?away:home;
        scoreHTML=`<div class="divider"></div>
        <div>${w.team.displayName} - ${w.score}</div>
        <div>${l.team.displayName} - ${l.score}</div>
        <div class="spacer"></div>`;
    }

    const tableHTML=buildTable(away,home);

    let broadcast="";
    if(!isFinal && comp.broadcasts?.length){
        broadcast = comp.broadcasts.map(b=>b.names).join(", ");
    }

    const gameDiv=document.createElement("div");
    gameDiv.className="game";
    gameDiv.dataset.id=event.id;

    gameDiv.innerHTML=`
    <div class="team-line">
    ${isLive?'<span class="live-badge">LIVE</span>':''}
    <img src="${away.team.logo}">${away.team.abbreviation} @ 
    <img src="${home.team.logo}">${home.team.abbreviation}
    </div>

    <div class="spacer"></div>
    ${scoreHTML}
    ${tableHTML}

    <div class="spacer"></div>
    <div class="status">${statusText}</div>
    ${broadcast ? `<div class="status"><small>Watch: ${broadcast}</small></div>` : ""}
    `;

    grid.appendChild(gameDiv);
}

// Load games
async function loadGames(){
    containerDiv.innerHTML="";
    const res=await fetch(`https://site.api.espn.com/apis/site/v2/sports/${leagues[currentLeague]}/scoreboard`);
    const data=await res.json();

    const grid=document.createElement("div");
    grid.className="content";
    containerDiv.appendChild(grid);

    data.events.forEach(e=>renderGame(e,grid));
}

// Refresh live only
async function refreshLiveGames(){
    const res=await fetch(`https://site.api.espn.com/apis/site/v2/sports/${leagues[currentLeague]}/scoreboard`);
    const data=await res.json();

    data.events.forEach(event=>{
        const card=document.querySelector(`[data-id="${event.id}"]`);
        if(!card) return;

        const comp=event.competitions[0];
        const home=comp.competitors.find(t=>t.homeAway==="home");
        const away=comp.competitors.find(t=>t.homeAway==="away");

        const isLive=event.status.type.state==="in";
        const isFinal=event.status.type.completed;

        const statusDiv=card.querySelector(".status");
        statusDiv.textContent=isFinal?"Final":event.status.type.detail;

        card.querySelectorAll(".divider").forEach(e=>e.remove());

        if(isLive||isFinal){
            const w=home.score>=away.score?home:away;
            const l=w===home?away:home;

            const scoreBlock=document.createElement("div");
            scoreBlock.innerHTML=`
            <div class="divider"></div>
            <div>${w.team.displayName} - ${w.score}</div>
            <div>${l.team.displayName} - ${l.score}</div>
            <div class="spacer"></div>`;

            card.insertBefore(scoreBlock, card.querySelector(".scoreboard"));
        }

        const tableHTML=buildTable(away,home);
        const oldTable=card.querySelector(".scoreboard");
        if(oldTable && tableHTML) oldTable.outerHTML=tableHTML;
    });
}

loadGames();
setInterval(refreshLiveGames,15000);
</script>

</body>
</html>
