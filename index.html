<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Sports Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles for your requested Dark/Yellow theme */
        .dark-theme { background-color: #111827; color: #f3f4f6; }
        .yellow-theme { background-color: #fefce8; color: #111827; }
        
        /* Pulse animation for Live games */
        .animate-ping-slow {
            animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite;
        }
        @keyframes ping {
            75%, 100% { transform: scale(2); opacity: 0; }
        }

        /* Custom Scrollbar for a cleaner look */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body id="body" class="yellow-theme min-h-screen p-4 md:p-8 transition-colors duration-500">

    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <h1 class="text-4xl font-black tracking-tighter">SPORTS DASHBOARD</h1>
            <div class="flex items-center gap-4">
                <span id="lastUpdated" class="text-xs opacity-50 font-mono"></span>
                <button id="themeToggle" class="px-6 py-2 rounded-full border-2 border-current font-bold hover:bg-black hover:text-white transition-all uppercase text-sm">
                    Toggle Dark Mode
                </button>
            </div>
        </div>

        <div class="bg-white/50 backdrop-blur-md p-4 rounded-2xl shadow-sm border border-black/5 mb-8 flex flex-col md:flex-row gap-4 sticky top-4 z-50">
            <div id="leagueSwitcher" class="flex gap-2 overflow-x-auto pb-2 md:pb-0 no-scrollbar">
                </div>
            <input type="text" id="teamSearch" placeholder="Search team or city..." 
                class="flex-1 bg-white border border-gray-300 rounded-xl px-4 py-2 text-black focus:ring-4 focus:ring-blue-500/20 outline-none transition-all shadow-inner">
        </div>

        <div id="loader" class="hidden flex flex-col items-center justify-center py-
